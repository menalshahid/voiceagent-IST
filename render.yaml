# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploy: New → Blueprint → connect repo → apply this file (or paste YAML).

services:
  - type: web
    name: ist-voice-assistant
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --worker-class gevent --workers 1 --timeout 180 --graceful-timeout 60
    healthCheckPath: /health
    envVars:
      # Required — Groq STT + LLM (comma-separated GROQ_API_KEYS also supported in Dashboard)
      - key: GROQ_API_KEY
        sync: false
      # Optional — POST /api/admin/reload-kb (after updating all_kb.txt or running ist_kb_sync locally)
      - key: IST_ADMIN_SECRET
        sync: false
      # Optional — override IST pages to scrape (ist_kb_sync.py); web app does not need this at runtime
      - key: IST_SCRAPE_URLS
        sync: false
